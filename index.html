<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Palette Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
</head>
<body>
    <div class="background-decoration">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
    </div>

    

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-palette"></i> Random Color Palette Generator</h1>
            <p>Create beautiful color combinations with real color data from The Color API!</p>
        </div>

        <div class="controls">
            <button class="btn" onclick="generateRandomPalette()" id="randomBtn">
                <i class="fas fa-dice"></i> Random Palette
            </button>
            <button class="btn secondary" onclick="generateMonochromatic()" id="monoBtn">
                <i class="fas fa-layer-group"></i> Monochromatic
            </button>
            <button class="btn tertiary" onclick="generateComplementary()" id="compBtn">
                <i class="fas fa-yin-yang"></i> Complementary
            </button>
            <button class="btn quaternary" onclick="generateAnalogous()" id="analogBtn">
                <i class="fas fa-circle-notch"></i> Analogous
            </button>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">Something went wrong. Please try again.</span>
        </div>

        <div class="palette-container">
            <div class="palette" id="palette">
                <!-- Colors will be generated here -->
            </div>
            <div class="palette-info" id="paletteInfo">
                <i class="fas fa-info-circle"></i> Click on any color to copy its hex code!
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Color copied to clipboard!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
